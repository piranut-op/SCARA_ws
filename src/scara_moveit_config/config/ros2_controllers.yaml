# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    ee_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - Link_1_joint
      - Link_2_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
ee_controller:
  ros__parameters:
    joints:
      - ee_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity